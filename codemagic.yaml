workflows:
  ios-swift-workflow:
    name: SISS iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - signing_credentials
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Auto-Generate Xcode Project
        script: |
          # Dynamically initialize a Swift package definition for the build environment
          echo "// swift-tools-version:5.9" > Package.swift
          echo "import PackageDescription" >> Package.swift
          echo "let package = Package(name: \"siss\", platforms: [.iOS(.v17)], products: [.executable(name: \"siss\", targets: [\"siss\"])], targets: [.target(name: \"siss\", path: \".\", exclude: [\"codemagic.yaml\"])])" >> Package.swift
          
          # Force generate a temporary workspace project file
          swift package generate-xcodeproj --output siss.xcodeproj
      - name: Build iOS App (.ipa)
        script: |
          xcodebuild archive -project siss.xcodeproj -scheme siss -destination "generic/platform=iOS" -archivePath build/siss.xcarchive
          xcodebuild -exportArchive -archivePath build/siss.xcarchive -exportPath build/ios/ipa -exportOptionsPlist Info.plist
    artifacts:
      - build/ios/ipa/*.ipa