workflows:
  ios-swift-workflow:
    name: SISS iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - signing_credentials
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Bootstrap Xcode Project Structure
        script: |
          # 1. Download a clean, empty iOS project skeleton structure
          git clone https://github.com/codemagic-ci-cd/cli-tools-templates.git /tmp/templates
          cp -R /tmp/templates/ios-swift/* .
          
          # 2. Rename the generic blueprint project to match your app name
          mv ios-swift.xcodeproj siss.xcodeproj
          sed -i '' 's/ios-swift/siss/g' siss.xcodeproj/project.pbxproj
          
          # 3. Clean out template placeholders so your actual files take priority
          rm -rf ContentView.swift ios_swiftApp.swift
      - name: Build iOS App (.ipa)
        script: |
          # Compile the app target cleanly using your injected MVVM code files
          xcodebuild archive -project siss.xcodeproj -scheme siss -destination "generic/platform=iOS" -archivePath build/siss.xcarchive CODE_SIGNING_ALLOWED=NO
          
          # Package the final artifact payload folder layout
          mkdir -p build/ios/ipa
          PayloadDir="build/siss.xcarchive/Products/Applications"
          cd $PayloadDir
          zip -r ../../../../build/ios/ipa/siss.ipa *.app
    artifacts:
      - build/ios/ipa/*.ipa