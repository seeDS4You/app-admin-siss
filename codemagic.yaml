workflows:
  ios-swift-workflow:
    name: SISS iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - signing_credentials
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Generate Perfect Native Xcode Project
        script: |
          # Install the Xcode generator tool using Homebrew
          brew install xcodegen
          
          # Generate a 100% stable, compliant .xcodeproj right on the build node
          xcodegen generate
      - name: Build iOS App (.ipa)
        script: |
          # Compile the generated app target cleanly into an archive
          xcodebuild archive -project siss.xcodeproj -scheme siss -destination "generic/platform=iOS" -archivePath build/siss.xcarchive CODE_SIGNING_ALLOWED=NO
          
          # Package the compiled app binary payload into a functional .ipa container
          mkdir -p build/ios/ipa
          PayloadDir="build/siss.xcarchive/Products/Applications"
          cd $PayloadDir
          zip -r ../../../../build/ios/ipa/siss.ipa *.app
    artifacts:
      - build/ios/ipa/*.ipa