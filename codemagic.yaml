workflows:
  admin-ios:
    name: SISS Admin iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          # Runs directly in the root folder where project.yml sits
          xcodegen generate
      - name: Build IPA
        script: |
          # 1. Archive the project natively using the correct root path
          xcodebuild -project SISSAdmin.xcodeproj \
            -scheme SISSAdmin \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/SISSAdmin.xcarchive \
            archive CODE_SIGNING_ALLOWED=NO
            
          # 2. Package the compiled app folder into an installable .ipa binary
          mkdir -p $CM_BUILD_DIR/build/ios/ipa
          PayloadDir="$CM_BUILD_DIR/SISSAdmin.xcarchive/Products/Applications"
          cd $PayloadDir
          zip -r $CM_BUILD_DIR/build/ios/ipa/SISSAdmin.ipa *.app
    artifacts:
      - build/ios/ipa/*.ipa