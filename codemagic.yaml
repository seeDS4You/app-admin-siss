workflows:
  ios-swift-workflow:
    name: SISS iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - signing_credentials
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Generate Native Xcode Project Blueprint
        script: |
          # 1. Use the native Swift package configuration to build a clean structural workspace
          echo "// swift-tools-version:5.9" > Package.swift
          echo "import PackageDescription" >> Package.swift
          echo "let package = Package(name: \"siss\", platforms: [.iOS(.v17)], products: [.library(name: \"siss\", targets: [\"siss\"])], targets: [.target(name: \"siss\", path: \".\", exclude: [\"codemagic.yaml\"])])" >> Package.swift
          
          # 2. Force native file serialization into a standard project definition layout
          xcodebuild -create-xcworkspace -workspace siss.xcworkspace
      - name: Build iOS App Layout
        script: |
          # Compile all modules under a generic iOS hardware architecture profile
          xcodebuild build -workspace siss.xcworkspace -scheme siss-Package -destination "generic/platform=iOS" CODE_SIGNING_ALLOWED=NO
          
          # Bundle the build artifacts safely into the deployment container
          mkdir -p build/ios/ipa
          cd .build/plugins/outputs
          zip -r ../../../build/ios/ipa/siss.ipa . -x "*.DS_Store" || true
    artifacts:
      - build/ios/ipa/*.ipa