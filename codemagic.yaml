workflows:
  ios-swift-workflow:
    name: SISS iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - signing_credentials
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Initialize Xcode project settings
        script: | 
          echo "Building SISS architecture..."
      - name: Build iOS App (.ipa)
        script: |
          xcodebuild build -scheme "siss" -destination "generic/platform=iOS"
    artifacts:
      - build/ios/ipa/*.ipa