workflows:
  ios-swift-workflow:
    name: SISS iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - signing_credentials
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Build and Package iOS Application
        script: |
          # 1. Create a clean native iOS Project template structure
          swift package init --type executable
          
          # 2. Modify the package definition file to support native iOS build profiles
          cat << 'EOF' > Package.swift
          // swift-tools-version:5.9
          import PackageDescription

          let package = Package(
              name: "siss",
              platforms: [.iOS(.v17)],
              products: [
                  .executable(name: "siss", targets: ["siss"])
              ],
              targets: [
                  .executableTarget(
                      name: "siss",
                      path: ".",
                      exclude: ["codemagic.yaml", "Package.swift"]
                  )
              ]
          )
          EOF

          # 3. Compile the package natively into an executable binary layout
          swift build -c release --triple arm64-apple-ios17.0
          
          # 4. Create the standard iOS app folder container structure
          mkdir -p build/ios/ipa/Payload/siss.app
          
          # 5. Copy the compiled application binary into the package payload
          cp .build/arm64-apple-ios17.0/release/siss build/ios/ipa/Payload/siss.app/siss
          
          # 6. Compress everything into an installable OTA deployment package
          cd build/ios/ipa
          zip -r siss.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa