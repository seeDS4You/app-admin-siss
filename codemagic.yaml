workflows:
  admin-ios:
    name: SISS Admin iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Install xcodegen
        script: |
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Build IPA
        script: |
          # 1. Archive the project natively
          xcodebuild -project SISSAdmin.xcodeproj \
            -scheme SISSAdmin \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/SISSAdmin.xcarchive \
            archive CODE_SIGNING_ALLOWED=NO
            
          # 2. Build a strict, valid iOS Payload directory structure
          mkdir -p $CM_BUILD_DIR/build/ios/ipa/Payload
          
          # 3. Copy the compiled .app folder into the Payload directory
          cp -R $CM_BUILD_DIR/SISSAdmin.xcarchive/Products/Applications/SISSAdmin.app $CM_BUILD_DIR/build/ios/ipa/Payload/
          
          # 4. Zip the Payload folder itself into the final .ipa archive
          cd $CM_BUILD_DIR/build/ios/ipa
          zip -r SISSAdmin.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa