workflows:
  admin-ios:
    name: SISS Admin iOS
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Install xcodegen
        script: brew install xcodegen
      - name: Generate Xcode Project
        script: |
          cd siss-admin-ios
          xcodegen generate
      - name: Build IPA
        script: |
          cd siss-admin-ios
          
          # 1. Compile the workspace project layout into a native app archive
          xcodebuild -project SISSAdmin.xcodeproj \
            -scheme SISSAdmin \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/SISSAdmin.xcarchive \
            archive CODE_SIGNING_ALLOWED=NO
            
          # 2. Package the compiled app payload folder structure into a genuine .ipa file
          mkdir -p $CM_BUILD_DIR/build/ios/ipa
          PayloadDir="$CM_BUILD_DIR/SISSAdmin.xcarchive/Products/Applications"
          cd $PayloadDir
          zip -r $CM_BUILD_DIR/build/ios/ipa/SISSAdmin.ipa *.app
    artifacts:
      - build/ios/ipa/*.ipa